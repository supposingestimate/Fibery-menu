<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Embed Menu</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f8fafc;
      font-family: Arial, sans-serif;
    }

    .dashboard-menu {
      width: 100%;
      max-width: 280px;
      padding: 12px;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
    }

    .menu-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 0;
      border-radius: 14px;
      padding: 10px 12px;
      background: transparent;
      color: #0f172a;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .menu-toggle:hover {
      background: #f1f5f9;
    }

    .menu-icon {
      font-size: 18px;
      line-height: 1;
    }

    .menu-list {
      display: none;
      margin-top: 8px;
    }

    .dashboard-menu.open .menu-list,
    .dashboard-menu.open .menu-footer {
      display: block;
    }

    .menu-link,
    .logout-button {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 0;
      border-radius: 14px;
      padding: 10px 12px;
      background: transparent;
      color: #334155;
      font-size: 14px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .menu-link:hover {
      background: #f1f5f9;
      color: #020617;
    }

    .menu-link.active {
      background: #0f172a;
      color: #ffffff;
    }

    .link-icon {
      width: 20px;
      text-align: center;
    }

    .menu-footer {
      display: none;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #e2e8f0;
    }

    .logout-button:hover {
      background: #fef2f2;
      color: #dc2626;
    }
  </style>
</head>
<body>
  <aside class="dashboard-menu" id="dashboardMenu">
    <button class="menu-toggle" id="menuToggle" aria-expanded="false">
      <span>Dashboard Menu</span>
      <span class="menu-icon" id="menuIcon">☰</span>
    </button>

    <nav class="menu-list" aria-label="Dashboard navigation">
      <a class="menu-link active" href="#overview">
        <span class="link-icon">⌂</span>
        <span>Overview</span>
      </a>
      <a class="menu-link" href="#analytics">
        <span class="link-icon">▣</span>
        <span>Analytics</span>
      </a>
      <a class="menu-link" href="#alerts">
        <span class="link-icon">●</span>
        <span>Alerts</span>
      </a>
      <a class="menu-link" href="#profile">
        <span class="link-icon">◉</span>
        <span>Profile</span>
      </a>
      <a class="menu-link" href="#settings">
        <span class="link-icon">⚙</span>
        <span>Settings</span>
      </a>
    </nav>

    <div class="menu-footer">
      <button class="logout-button" type="button">
        <span class="link-icon">↪</span>
        <span>Sign out</span>
      </button>
    </div>
  </aside>

  <script>
    const menu = document.getElementById("dashboardMenu");
    const toggle = document.getElementById("menuToggle");
    const icon = document.getElementById("menuIcon");
    const links = document.querySelectorAll(".menu-link");

    toggle.addEventListener("click", () => {
      const isOpen = menu.classList.toggle("open");
      toggle.setAttribute("aria-expanded", isOpen);
      icon.textContent = isOpen ? "×" : "☰";
    });

    links.forEach((link) => {
      link.addEventListener("click", () => {
        links.forEach((item) => item.classList.remove("active"));
        link.classList.add("active");
      });
    });
  </script>
</body>
</html>
