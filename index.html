<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Horizontal Menu</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }

    .menu-container {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .menu-button {
      width: 120px;
      height: 46px;

      border: none;
      border-radius: 12px;

      background: #1e293b;
      color: white;

      font-size: 18px;
      font-weight: 600;

      cursor: pointer;

      transition: all 0.2s ease;
    }

    .menu-button:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }
  </style>
</head>

<body>

  <div class="menu-container">

    <button class="menu-button"
      onclick="openExternal(event, 'https://het-laser-lokaal.fibery.io/default/Sales-67?no-menu')">
      Sales
    </button>

    <button class="menu-button"
      onclick="openExternal(event, 'https://het-laser-lokaal.fibery.io/default/Productie-89?no-menu')">
      Productie
    </button>

    <button class="menu-button"
      onclick="openExternal(event, 'https://het-laser-lokaal.fibery.io/default/Administratie-93?no-menu')">
      Administratie
    </button>

    <button class="menu-button"
      onclick="openExternal(event, 'https://het-laser-lokaal.fibery.io/default/Logistiek-afspraken-vandaag-en-morgen-86?no-menu')">
      Logistiek/afspraken
    </button>

    <button class="menu-button"
      onclick="openExternal(event, 'https://het-laser-lokaal.fibery.io/default/Afspraken-kalender-75?no-menu')">
      To-do lijst
    </button>

  </div>

  <script>
    function openExternal(event, url) {

      // Stop iframe/page navigation
      event.preventDefault();
      event.stopPropagation();

      // Open external tab
      const newWindow = window.open(
        url,
        '_blank',
        'noopener,noreferrer'
      );

      // Reset iframe state immediately
      setTimeout(() => {
        window.history.pushState({}, '', window.location.pathname);
      }, 10);

      // Fallback if popup blocked
      if (!newWindow) {
        console.log('Popup blocked');
      }

      return false;
    }
  </script>

</body>
</html>
