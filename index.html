<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Horizontal Menu</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: transparent;
    }

    .menu-container {
      width: 95vw;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      padding: 10px;
      background: transparent;
    }

    .menu-button {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 120px;
      height: 52px;
      padding: 0 18px;

      border-radius: 14px;
      background: #1e293b;
      color: white;

      font-size: 18px;
      font-weight: 600;
      text-decoration: none;

      transition: all 0.2s ease;
    }

    .menu-button:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }

    @media (max-width: 900px) {
      .menu-container {
        flex-wrap: wrap;
      }

      .menu-button {
        min-width: 140px;
      }
    }
  </style>
</head>

<body>

  <div class="menu-container">

    <a class="menu-button"
       href="https://www.google.com/search?q=Dashboard"
       target="_blank">
       Dashboard
    </a>

    <a class="menu-button"
       href="https://www.google.com/search?q=Analytics"
       target="_blank">
       Analytics
    </a>

    <a class="menu-button"
       href="https://www.google.com/search?q=Projects"
       target="_blank">
       Projects
    </a>

    <a class="menu-button"
       href="https://www.google.com/search?q=Messages"
       target="_blank">
       Messages
    </a>

    <a class="menu-button"
       href="https://www.google.com/search?q=Settings"
       target="_blank">
       Settings
    </a>

  </div>

</body>
</html>
