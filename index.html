<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Minimal Horizontal Menu</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }

    .menu-container {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .menu-button {
      display: flex;
      align-items: center;
      justify-content: center;

      width: 120px;
      height: 46px;

      border-radius: 12px;
      background: #1e293b;
      color: white;

      font-size: 18px;
      font-weight: 600;
      text-decoration: none;

      transition: all 0.2s ease;
    }

    .menu-button:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }
  </style>
</head>

<body>

  <div class="menu-container">

    <a class="menu-button"
       href="https://example.com"
       target="_top">
       Dashboard
    </a>

    <a class="menu-button"
       href="https://example.com"
       target="_top">
       Analytics
    </a>

    <a class="menu-button"
       href="https://example.com"
       target="_top">
       Projects
    </a>

    <a class="menu-button"
       href="https://example.com"
       target="_top">
       Messages
    </a>

    <a class="menu-button"
       href="https://example.com"
       target="_top">
       Settings
    </a>

  </div>

</body>
</html>
