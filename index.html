<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Horizontal Menu</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }

    .menu-container {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .menu-button {
      width: 120px;
      height: 46px;

      border: none;
      border-radius: 12px;

      background: #1e293b;
      color: white;

      font-size: 18px;
      font-weight: 600;

      cursor: pointer;

      transition: all 0.2s ease;
    }

    .menu-button:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }
  </style>
</head>

<body>

  <div class="menu-container">

    <button class="menu-button"
      onclick="openExternal('https://example.com')">
      Dashboard
    </button>

    <button class="menu-button"
      onclick="openExternal('https://example.com')">
      Analytics
    </button>

    <button class="menu-button"
      onclick="openExternal('https://example.com')">
      Projects
    </button>

    <button class="menu-button"
      onclick="openExternal('https://example.com')">
      Messages
    </button>

    <button class="menu-button"
      onclick="openExternal('https://example.com')">
      Settings
    </button>

  </div>

  <script>
    function openExternal(url) {
      const link = document.createElement('a');

      link.href = url;
      link.target = '_blank';
      link.rel = 'noopener noreferrer';

      document.body.appendChild(link);

      link.click();

      document.body.removeChild(link);
    }
  </script>

</body>
</html>
