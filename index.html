<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizontal Dashboard Menu</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .menu-container {
      width: 95vw;
      height: 160px;
      background: #111827;
      border-radius: 28px;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    .menu-button {
      flex: 1;
      height: 100%;
      border: none;
      border-radius: 22px;
      background: #1e293b;
      color: white;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      min-width: 120px;
    }

    .menu-button:hover {
      background: #2563eb;
      transform: translateY(-4px);
    }

    .menu-button:active {
      transform: scale(0.98);
    }

    @media (max-width: 900px) {
      .menu-container {
        flex-direction: column;
        height: auto;
      }

      .menu-button {
        width: 100%;
        height: 70px;
      }
    }
  </style>
</head>

<body>

  <div class="menu-container">

    <button class="menu-button" onclick="openSearch('Dashboard Overview')">
      Dashboard
    </button>

    <button class="menu-button" onclick="openSearch('Analytics Reports')">
      Analytics
    </button>

    <button class="menu-button" onclick="openSearch('Project Tasks')">
      Projects
    </button>

    <button class="menu-button" onclick="openSearch('Team Messages')">
      Messages
    </button>

    <button class="menu-button" onclick="openSearch('Settings Panel')">
      Settings
    </button>

  </div>

  <script>
    function openSearch(query) {
      const url = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
      window.open(url, '_blank');
    }
  </script>

</body>
</html>
